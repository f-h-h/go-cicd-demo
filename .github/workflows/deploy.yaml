name: CI/CD to Kind (on GitHub)

on:
  push:
    branches: [ master ]   # 触发分支，可改为 main

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/go-cicd-demo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录到 Docker Hub（如果你希望推送镜像，否则可移除）
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 生成版本标签（使用 Git commit 短 hash）
      - name: Generate version tag
        id: version
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 构建并推送 Docker 镜像（如果不需要推送，可改为只构建）
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true   # 设为 false 则只构建不推送
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.tag }}

      # 安装 Kind
      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      # 创建 Kind 集群（配置端口映射，方便测试）
      - name: Create Kind cluster
        run: |
          kind create cluster --name demo --config - <<EOF
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
            extraPortMappings:
            - containerPort: 30000
              hostPort: 30000
          EOF
      - name: Load image into Kind
        run: |
          # 拉取镜像（保留，这部分成功）
          docker pull ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.tag }}
          docker pull ${{ env.DOCKER_IMAGE }}:latest
          
          # 加载到 Kind 集群（保留，注意：kind load 命令的 --name 是支持的，不用改）
          kind load docker-image ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.tag }} --name demo
          kind load docker-image ${{ env.DOCKER_IMAGE }}:latest --name demo
          

      # 更新 Kubernetes 部署清单中的占位符
      - name: Update Kubernetes deployment manifests
        run: |
          cd k8s
          sed -i "s|IMAGE_PLACEHOLDER|${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.tag }}|g" deployment.yaml
          sed -i "s|VERSION_PLACEHOLDER|${{ steps.version.outputs.tag }}|g" deployment.yaml
          cat deployment.yaml  # 打印替换结果（可选）

      # 部署到 Kind 集群
      - name: Deploy to Kind
        run: |
          kubectl apply -f k8s/
          kubectl rollout status deployment/go-cicd-demo

      # 测试服务（通过 port-forward 访问）
      - name: Test service
        run: |
          kubectl port-forward service/go-cicd-demo 30000:80 &
          sleep 5
          curl http://localhost:30000